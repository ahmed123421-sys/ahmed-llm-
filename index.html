<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed LLM Scholar - The Ultimate Research Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
    <style>
        .glowing-red { box-shadow: 0 0 10px #ef4444; background: #ef4444; }
        .glowing-yellow { box-shadow: 0 0 10px #facc15; background: #facc15; }
        .glowing-green { box-shadow: 0 0 10px #22c55e; background: #22c55e; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-900 font-sans overflow-hidden">

    <div id="app" class="h-screen flex flex-col">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                Ahmed LLM Scholar
            </h1>
            <div class="flex items-center space-x-4">
                <div id="status-light" class="w-4 h-4 rounded-full bg-red-500"></div>
                <input type="password" id="api-key" placeholder="Enter Gemini API Key..." class="text-sm p-2 border rounded">
                <button onclick="createRoom()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Go Live</button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <!-- Left Sidebar: Tools & PDF -->
            <section class="w-1/3 flex flex-col border-r bg-white p-4 overflow-y-auto">
                <input type="file" id="pdf-upload" class="mb-4" accept="application/pdf">
                <div id="pdf-viewer" class="border rounded bg-slate-100 h-96 overflow-auto">
                    <p class="p-4 text-gray-500">No PDF Loaded. Drag and drop to analyze.</p>
                </div>
                <div class="mt-4 p-4 border rounded bg-slate-50">
                    <h3 class="font-bold mb-2">Academic Actions</h3>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <button onclick="academicAction('summarize')" class="bg-blue-100 p-2 rounded">Summarize</button>
                        <button onclick="academicAction('critique')" class="bg-blue-100 p-2 rounded">Critique Methodology</button>
                        <button onclick="academicAction('glossary')" class="bg-blue-100 p-2 rounded">Extract Formulas</button>
                        <button onclick="exportReport()" class="bg-green-100 p-2 rounded font-bold">Export Report</button>
                    </div>
                </div>
            </section>

            <!-- Middle: Content Tabs -->
            <section class="w-1/3 border-r p-4 overflow-y-auto bg-slate-50">
                <nav class="flex space-x-2 border-b mb-4 text-sm">
                    <button onclick="showTab('tab-raw')" class="px-3 py-1 bg-white border rounded-t">Raw Text</button>
                    <button onclick="showTab('tab-sandbox')" class="px-3 py-1 bg-white border rounded-t">Sandbox</button>
                    <button onclick="showTab('tab-canvas')" class="px-3 py-1 bg-white border rounded-t">Concept Canvas</button>
                </nav>
                <div id="tab-raw" class="tab-content active"><pre id="raw-content" class="text-xs"></pre></div>
                <div id="tab-sandbox" class="tab-content"><canvas id="mathChart"></canvas></div>
                <div id="tab-canvas" class="tab-content">
                    <input id="gen-prompt" class="w-full p-2 border rounded mb-2" placeholder="Describe diagram...">
                    <button onclick="generateImage()" class="w-full bg-purple-600 text-white p-2 rounded">Generate Diagram</button>
                    <div id="gen-result" class="mt-4"></div>
                </div>
            </section>

            <!-- Right Sidebar: Chatbot -->
            <section class="w-1/3 flex flex-col p-4 bg-white">
                <div class="mb-2">
                    <select id="persona-select" class="w-full p-2 border rounded text-sm">
                        <option value="Ahmed LLM">Standard Scholar</option>
                        <option value="Feynman Master">Feynman Master</option>
                        <option value="Rigorous Reviewer">Rigorous Reviewer</option>
                        <option value="Socratic Debater">Socratic Debater</option>
                    </select>
                </div>
                <div id="chat-history" class="flex-1 overflow-y-auto mb-4 border rounded p-2 bg-slate-50 text-sm"></div>
                <div class="flex flex-col gap-2">
                    <textarea id="user-input" class="p-2 border rounded" placeholder="Ask about the paper..."></textarea>
                    <button onclick="sendMessage()" class="bg-blue-600 text-white p-2 rounded">Send to Ahmed</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        // Global State & Imports
        let extractedText = "";
        const API_BASE = "https://generativelanguage.googleapis.com/v1beta/models/";

        window.sendMessage = async () => {
            const input = document.getElementById('user-input').value;
            const history = document.getElementById('chat-history');
            const status = document.getElementById('status-light');
            
            history.innerHTML += `<div class="p-2 bg-blue-100 rounded mb-2"><b>You:</b> ${input}</div>`;
            
            status.className = "w-4 h-4 rounded-full glowing-yellow";
            try {
                const response = await fetch(`${API_BASE}gemini-3-flash-preview:generateContent?key=${document.getElementById('api-key').value}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{role: 'user', parts: [{text: `Context: ${extractedText}\nQuestion: ${input}`}]}],
                        tools: [{google_search: {}}]
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                history.innerHTML += `<div class="p-2 bg-gray-200 rounded mb-2"><b>Ahmed LLM:</b> ${reply}</div>`;
                status.className = "w-4 h-4 rounded-full glowing-green";
            } catch (e) {
                status.className = "w-4 h-4 rounded-full glowing-red";
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.generateImage = async () => {
            const prompt = document.getElementById('gen-prompt').value;
            const res = document.getElementById('gen-result');
            res.innerHTML = "Generating...";
            
            const response = await fetch(`${API_BASE}imagen-4.0-generate-001:predict?key=${document.getElementById('api-key').value}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({instances: [{prompt}]})
            });
            const data = await response.json();
            res.innerHTML = `<img src="data:image/png;base64,${data.predictions[0].bytesBase64Encoded}" class="w-full rounded">`;
        };

        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ");
                }
                extractedText = text;
                document.getElementById('raw-content').innerText = text.substring(0, 2000) + "...";
            };
            reader.readAsArrayBuffer(file);
        });

        window.exportReport = () => {
            const blob = new Blob([`# Ahmed LLM Report\n\n${extractedText.substring(0, 5000)}`], {type: 'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "research_report.md";
            a.click();
        };

        // Initialize sandbox chart
        new Chart(document.getElementById('mathChart'), {
            type: 'line',
            data: { labels: [1,2,3,4], datasets: [{ label: 'Loss Function', data: [10, 5, 2, 1] }] }
        });
    </script>
</body>
</html>
